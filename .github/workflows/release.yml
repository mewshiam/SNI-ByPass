name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag to release (example: v1.2.3)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build binary
        run: |
          pyinstaller --onefile --name sni-bypass main.py

      - name: Prepare release assets
        run: |
          mkdir -p release
          cp dist/sni-bypass release/sni-bypass-linux-amd64 || true
          cp config.json release/config.json
          cp README.md release/README.md
          tar -czf sni-bypass-${{ env.RELEASE_TAG }}-linux-amd64.tar.gz -C release .

      - name: Ensure tag exists for workflow_dispatch
        if: github.event_name == 'workflow_dispatch'
        run: |
          git fetch --tags
          if ! git rev-parse "${{ env.RELEASE_TAG }}" >/dev/null 2>&1; then
            git tag "${{ env.RELEASE_TAG }}"
            git push origin "${{ env.RELEASE_TAG }}"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: |
            sni-bypass-${{ env.RELEASE_TAG }}-linux-amd64.tar.gz
          generate_release_notes: true
